<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maintenance — PT. Sumber Hayati Mandiri</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #07111f;
    --bg2:    #0d1d30;
    --cyan:   #00d4ff;
    --cyan2:  #00a3c4;
    --gold:   #ffd166;
    --white:  #e8f4ff;
    --soft:   #7ab8d4;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ── BACKGROUND STARS ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.6); }
    50%      { opacity: var(--op); transform: scale(1); }
  }

  /* ── GLOW ORBS ── */
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .orb1 {
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(0,212,255,0.12), transparent 70%);
    top: -80px; left: -60px;
  }
  .orb2 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(255,209,102,0.08), transparent 70%);
    bottom: -60px; right: -40px;
    animation-delay: -4s;
  }
  @keyframes drift {
    from { transform: translate(0,0); }
    to   { transform: translate(20px, 15px); }
  }

  /* ── CARD ── */
  .card {
    position: relative; z-index: 10;
    background: linear-gradient(145deg, rgba(13,29,48,0.95) 0%, rgba(9,18,30,0.98) 100%);
    border: 1px solid rgba(0,212,255,0.18);
    border-radius: 28px;
    padding: 48px 36px 44px;
    max-width: 380px;
    width: 92vw;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(0,212,255,0.05),
      0 20px 60px rgba(0,0,0,0.6),
      0 0 80px rgba(0,212,255,0.04) inset;
    animation: cardIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── GEAR ICON ── */
  .gear-wrap {
    position: relative;
    width: 90px; height: 90px;
    margin: 0 auto 24px;
    animation: cardIn 1s 0.15s both;
  }
  .gear-ring {
    position: absolute; inset: 0;
    border: 2.5px solid rgba(0,212,255,0.25);
    border-radius: 50%;
    border-top-color: var(--cyan);
    animation: spin 2.5s linear infinite;
  }
  .gear-ring2 {
    position: absolute; inset: 8px;
    border: 2px solid rgba(0,212,255,0.12);
    border-radius: 50%;
    border-bottom-color: var(--cyan2);
    animation: spin 3.5s linear infinite reverse;
  }
  .gear-emoji {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem;
    animation: gearbob 3s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes gearbob {
    0%,100% { transform: rotate(-8deg) scale(1); }
    50%      { transform: rotate(8deg) scale(1.05); }
  }

  /* ── BRAND ── */
  .brand {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--soft);
    text-transform: uppercase;
    margin-bottom: 6px;
    animation: cardIn 1s 0.25s both;
  }

  /* ── MAINTENANCE TITLE ── */
  .title-main {
    font-family: 'Pacifico', cursive;
    font-size: 2rem;
    color: var(--cyan);
    line-height: 1.15;
    margin-bottom: 6px;
    text-shadow: 0 0 40px rgba(0,212,255,0.4);
    animation: cardIn 1s 0.3s both;
  }
  .title-sub {
    font-size: 0.8rem;
    color: var(--soft);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
    animation: cardIn 1s 0.35s both;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 0 auto 28px;
    animation: cardIn 1s 0.4s both;
  }

  /* ── MESSAGE BUBBLE ── */
  .bubble {
    background: rgba(0,212,255,0.07);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 20px 20px 20px 6px;
    padding: 18px 22px;
    text-align: left;
    margin-bottom: 28px;
    position: relative;
    animation: cardIn 1s 0.45s both;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -10px; left: 18px;
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 0 solid transparent;
    border-top: 10px solid rgba(0,212,255,0.15);
  }
  .bubble p {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.65;
  }
  .bubble p .highlight {
    color: var(--gold);
    font-size: 1.12rem;
  }

  /* ── AVATAR / SENDER ── */
  .sender {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    animation: cardIn 1s 0.5s both;
  }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan2), #005f7a);
    border: 2px solid rgba(0,212,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .sender-info .s-name {
    font-size: 0.85rem; font-weight: 800; color: var(--white);
  }
  .sender-info .s-role {
    font-size: 0.72rem; color: var(--soft);
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    animation: cardIn 1s 0.55s both;
    margin-bottom: 28px;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.72rem; color: var(--soft);
    margin-bottom: 8px; font-weight: 700; letter-spacing: 0.5px;
  }
  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan2), var(--cyan));
    border-radius: 10px;
    width: 0%;
    animation: fillBar 2s 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    box-shadow: 0 0 10px rgba(0,212,255,0.5);
  }
  @keyframes fillBar { to { width: 72%; } }

  /* ── STATUS DOTS ── */
  .status-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 28px;
    animation: cardIn 1s 0.6s both;
  }
  .status-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.72rem; color: var(--soft); font-weight: 700;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .dot.green  { background: #00e676; box-shadow: 0 0 8px #00e676; }
  .dot.orange { background: #ffb300; box-shadow: 0 0 8px #ffb300; animation-delay: 0.4s; }
  .dot.red    { background: #ff5252; box-shadow: 0 0 8px #ff5252; animation-delay: 0.8s; }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.4); opacity: 0.7; }
  }

  /* ── FOOTER ── */
  .footer-note {
    font-size: 0.72rem;
    color: rgba(122,184,212,0.5);
    animation: cardIn 1s 0.65s both;
    letter-spacing: 0.3px;
  }
  .footer-note span {
    color: var(--cyan);
    font-weight: 700;
  }

  /* ── FLOATING TOOLS ── */
  .float-icons {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
  }
  .fi {
    position: absolute;
    font-size: 1.4rem;
    opacity: 0.07;
    animation: floatUp var(--fd) ease-in-out infinite var(--fdelay);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.05; }
    50%  { opacity: 0.12; }
    100% { transform: translateY(-30px) rotate(20deg); opacity: 0.05; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Glow orbs -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Floating tool icons -->
<div class="float-icons" id="floatIcons"></div>

<!-- MAIN CARD -->
<div class="card">

  <!-- Gear animation -->
  <div class="gear-wrap">
    <div class="gear-ring"></div>
    <div class="gear-ring2"></div>
    <div class="gear-emoji">⚙️</div>
  </div>

  <!-- Brand -->
  <div class="brand">PT. Sumber Hayati Mandiri</div>

  <!-- Title -->
  <div class="title-main">Maintenance</div>
  <div class="title-sub">Sistem Absensi • Sedang Diperbarui</div>

  <div class="divider"></div>

  <!-- Message bubble -->
  <div class="bubble">
    <p>
      Sabar ya <span class="highlight">Isya</span>,<br>
      lagi maintenance webnya ☺️🙏🏻
    </p>
  </div>

  <!-- Sender -->
  <div class="sender">
    <div class="avatar">🛠️</div>
    <div class="sender-info">
      <div class="s-name">Developer</div>
      <div class="s-role">PT. Sumber Hayati Mandiri</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress Update</span>
      <span id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>

  <!-- Status dots -->
  <div class="status-row">
    <div class="status-item"><div class="dot green"></div> Database</div>
    <div class="status-item"><div class="dot orange"></div> Backend</div>
    <div class="status-item"><div class="dot red"></div> Frontend</div>
  </div>

  <!-- Footer -->
  <div class="footer-note">
    Akan segera kembali normal •
    <span>Terima kasih atas kesabarannya 🙏</span>
  </div>

</div>

<script>
  // ── Stars ──
  const starsEl = document.getElementById("stars");
  for (let i = 0; i < 80; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --dur:${(Math.random()*3+2).toFixed(1)}s;
      --delay:-${(Math.random()*5).toFixed(1)}s;
      --op:${(Math.random()*0.7+0.2).toFixed(2)};
    `;
    starsEl.appendChild(s);
  }

  // ── Floating icons ──
  const icons = ["🔧","⚓","🔩","⚙️","🛠️","🔨","📡","💡"];
  const floatEl = document.getElementById("floatIcons");
  for (let i = 0; i < 12; i++) {
    const f = document.createElement("div");
    f.className = "fi";
    f.textContent = icons[i % icons.length];
    f.style.cssText = `
      top:${Math.random()*90}%; left:${Math.random()*90}%;
      --fd:${(Math.random()*4+4).toFixed(1)}s;
      --fdelay:-${(Math.random()*6).toFixed(1)}s;
    `;
    floatEl.appendChild(f);
  }

  // ── Progress counter ──
  const pctEl = document.getElementById("pct");
  let current = 0;
  const target = 72;
  setTimeout(() => {
    const iv = setInterval(() => {
      if (current >= target) { clearInterval(iv); return; }
      current++;
      pctEl.textContent = current + "%";
    }, 27);
  }, 1200);
</script>
</body>
</html>
